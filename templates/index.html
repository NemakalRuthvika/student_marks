<!DOCTYPE html>
<html>
<head>
    <title>Student Marks Calculator</title>
    <style>
        body {
            font-family: Arial;
            background: #f2f6ff;
            padding: 30px;
        }
        .box {
            background: white;
            max-width: 500px;
            margin: auto;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 0 15px #ccc;
        }
        input, button {
            width: 100%;
            padding: 10px;
            margin: 7px 0;
        }
        button {
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 8px;
        }
        .result {
            background: #e8f5e9;
            padding: 15px;
            margin-top: 15px;
            border-radius: 10px;
        }
    </style>
</head>
<body>
<div class="box">
    <h2>Student Marks Calculator</h2>

    <form method="POST">
        <input type="text" name="name" placeholder="Student Name" required>
        <input type="text" name="roll" placeholder="Roll Number" required>
        <input type="number" name="sub1" placeholder="Subject 1 Marks" required>
        <input type="number" name="sub2" placeholder="Subject 2 Marks" required>
        <input type="number" name="sub3" placeholder="Subject 3 Marks" required>
        <input type="number" name="sub4" placeholder="Subject 4 Marks" required>
        <input type="number" name="sub5" placeholder="Subject 5 Marks" required>
        <button type="submit">Calculate</button>
    </form>

    {% if result %}
    <div class="result">
        <h3>Report Card</h3>
        <p>Name: {{ result.name }}</p>
        <p>Roll No: {{ result.roll }}</p>
        <p>Total: {{ result.total }}</p>
        <p>Average: {{ result.average }}</p>
        <p>Percentage: {{ result.percentage }}%</p>
        <p>Grade: {{ result.grade }}</p>
        <p>Result: {{ result.status }}</p>
        <a href="/download-pdf">Download PDF Report Card</a>
    </div>
    {% endif %}
</div>
</body>
</html>
