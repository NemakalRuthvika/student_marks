services:
  - type: web
    name: student-marks-calculator
    runtime: python
    plan: free

    buildCommand: |
      pip install -r requirements.txt
      echo "Build completed successfully"

    startCommand: |
      echo "Student Marks Calculator started successfully"
      gunicorn app:app

    envVars:
      - key: MONGODB_URI
        sync: false

      - key: MONGODB_DATABASE
        value: student_db